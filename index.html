<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Platform Hop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1C1915; }
    body { font-family: 'Chalkboard SE', 'Bradley Hand ITC', 'Comic Sans MS', cursive; }
    canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    /* ── mobile controller layout ── */
    .ctrl-btn {
      position: fixed;
      display: flex; align-items: center; justify-content: center;
      width: min(18vw, 90px); height: min(18vw, 90px);
      border-radius: 50%;
      background: rgba(242,239,231,0.55);
      border: 2.5px solid rgba(28,25,21,0.45);
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font: bold min(6vw,26px) 'Chalkboard SE','Comic Sans MS',cursive;
      color: #1C1915;
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active { background: rgba(242,239,231,0.80); transform: scale(0.93); }
    #bleft  { bottom: min(6vw,28px); left: min(4vw,20px); }
    #bright { bottom: min(6vw,28px); left: calc(min(4vw,20px) + min(18vw,90px) + min(3vw,14px)); }
    #bjump  { bottom: min(6vw,28px); right: min(4vw,20px);
              width: min(22vw,108px); height: min(22vw,108px);
              color: #D64832; border-color: rgba(214,72,50,0.6);
              font-size: min(7vw,32px); }
    #btakeout {
      position: fixed; top: 60px; right: 58px;
      padding: 7px 14px;
      font: bold 13px 'Chalkboard SE','Comic Sans MS',cursive;
      background: rgba(242,239,231,0.72);
      border: 1.5px solid rgba(122,56,8,0.6);
      border-radius: 20px;
      color: #7A3808;
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
      backdrop-filter: blur(4px);
    }
    #bfullscreen {
      position: fixed; top: 60px; right: 14px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(242,239,231,0.72);
      border: 1.5px solid rgba(28,25,21,0.35);
      border-radius: 8px;
      color: #1C1915;
      font-size: 17px;
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10;
    }
    #bfullscreen:active { background: rgba(242,239,231,0.92); }
    #bqr {
      position: fixed; top: 105px; right: 14px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(242,239,231,0.72);
      border: 1.5px solid rgba(28,25,21,0.35);
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10;
    }
    #bqr:active { background: rgba(242,239,231,0.92); }
    #bmkt {
      position: fixed; top: 150px; right: 14px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(242,239,231,0.72);
      border: 1.5px solid rgba(122,56,8,0.5);
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10;
    }
    #bmkt:active { background: rgba(242,239,231,0.92); }
    #bskins {
      position: fixed; top: 195px; right: 14px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(242,239,231,0.72);
      border: 1.5px solid rgba(28,25,21,0.35);
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10;
    }
    #bskins:active { background: rgba(242,239,231,0.92); }
    #skinsmodal {
      display: none; position: fixed; inset: 0;
      background: rgba(28,25,21,0.82);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    #skinsmodal.open { display: flex; }
    #skinsbox {
      background: #F2EFE7;
      border-radius: 18px;
      padding: 18px 18px 14px;
      width: min(340px, 94vw);
      max-height: 88vh;
      overflow-y: auto;
      font-family: 'Chalkboard SE','Comic Sans MS',cursive;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55);
    }
    #skinsbox h2 { font-size: 19px; color: #1C1915; text-align: center; margin-bottom: 12px; }
    .skin-card {
      display: flex; align-items: center; gap: 10px;
      background: rgba(28,25,21,0.06);
      border: 1.5px solid rgba(28,25,21,0.12);
      border-radius: 12px;
      padding: 9px 11px;
      margin-bottom: 8px;
    }
    .skin-card.active-skin { border-color: rgba(122,56,8,0.6); background: rgba(122,56,8,0.08); }
    .skin-preview {
      width: 36px; height: 44px; border-radius: 8px;
      position: relative; flex-shrink: 0;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.25);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .skin-face {
      width: 20px; height: 24px; border-radius: 50% 50% 40% 40%;
      margin-bottom: 2px;
      border: 1px solid rgba(0,0,0,0.2);
    }
    .skin-info { flex: 1; }
    .skin-name { font-size: 14px; font-weight: bold; color: #1C1915; }
    .skin-cost { font-size: 11px; color: #7A6848; margin-top: 1px; }
    .skin-action {
      flex-shrink: 0;
      padding: 6px 11px;
      font: bold 11px 'Chalkboard SE','Comic Sans MS',cursive;
      border-radius: 16px; cursor: pointer; border: 1.5px solid;
    }
    .skin-action.equipped { background: rgba(40,120,40,0.12); border-color: rgba(40,120,40,0.4); color: #2A6020; cursor: default; }
    .skin-action.equip    { background: rgba(28,25,21,0.08);  border-color: rgba(28,25,21,0.3);  color: #1C1915; }
    .skin-action.equip:active { opacity: 0.6; }
    .skin-action.buy      { background: rgba(122,56,8,0.10);  border-color: rgba(122,56,8,0.5);  color: #7A3808; }
    .skin-action.buy:active { opacity: 0.6; }
    .skin-action.broke    { background: rgba(180,40,20,0.07); border-color: rgba(180,40,20,0.3); color: #B02818; cursor: default; opacity: 0.6; }
    #skinsclose {
      display: block; width: 100%; margin-top: 4px;
      padding: 7px;
      font: bold 13px 'Chalkboard SE','Comic Sans MS',cursive;
      background: rgba(214,72,50,0.10);
      border: 1.5px solid rgba(214,72,50,0.45);
      border-radius: 20px; color: #D64832; cursor: pointer;
    }
    #mktmodal {
      display: none; position: fixed; inset: 0;
      background: rgba(28,25,21,0.80);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    #mktmodal.open { display: flex; }
    #mktbox {
      background: #F2EFE7;
      border-radius: 18px;
      padding: 18px 18px 14px;
      width: min(340px, 94vw);
      max-height: 90vh;
      overflow-y: auto;
      font-family: 'Chalkboard SE','Comic Sans MS',cursive;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55);
    }
    #mktbox h2 {
      font-size: 20px; color: #1C1915; text-align: center;
      margin-bottom: 4px;
    }
    #mktbalance {
      text-align: center; font-size: 13px; color: #7A3808;
      margin-bottom: 14px;
    }
    .mkt-item {
      display: flex; align-items: center; gap: 10px;
      background: rgba(28,25,21,0.06);
      border: 1.5px solid rgba(28,25,21,0.12);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 9px;
    }
    .mkt-item .mkt-icon { font-size: 22px; flex-shrink: 0; }
    .mkt-item .mkt-info { flex: 1; }
    .mkt-item .mkt-name { font-size: 14px; font-weight: bold; color: #1C1915; }
    .mkt-item .mkt-desc { font-size: 11px; color: #7A6848; margin-top: 1px; }
    .mkt-item .mkt-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      font: bold 12px 'Chalkboard SE','Comic Sans MS',cursive;
      border-radius: 16px;
      cursor: pointer;
      border: 1.5px solid;
      transition: opacity 0.15s;
    }
    .mkt-btn.buy {
      background: rgba(122,56,8,0.12);
      border-color: rgba(122,56,8,0.55);
      color: #7A3808;
    }
    .mkt-btn.buy:active { opacity: 0.6; }
    .mkt-btn.owned {
      background: rgba(40,120,40,0.12);
      border-color: rgba(40,120,40,0.4);
      color: #2A6020;
      cursor: default;
    }
    .mkt-btn.broke {
      background: rgba(180,40,20,0.08);
      border-color: rgba(180,40,20,0.3);
      color: #B02818;
      cursor: default; opacity: 0.65;
    }
    #mktclose {
      display: block; width: 100%; margin-top: 4px;
      padding: 7px;
      font: bold 13px 'Chalkboard SE','Comic Sans MS',cursive;
      background: rgba(214,72,50,0.10);
      border: 1.5px solid rgba(214,72,50,0.45);
      border-radius: 20px; color: #D64832; cursor: pointer;
    }
    #qrmodal {
      display: none; position: fixed; inset: 0;
      background: rgba(28,25,21,0.78);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    #qrmodal.open { display: flex; }
    #qrbox {
      background: #F2EFE7; border-radius: 16px; padding: 22px 24px;
      text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.55);
      font-family: 'Chalkboard SE','Comic Sans MS',cursive;
    }
    #qrbox p { font: bold 15px inherit; color: #5A4828; margin-bottom: 14px; }
    #qrbox small {
      display: block; font: 11px inherit; color: #8A7858;
      margin-top: 10px; max-width: 220px; word-break: break-all;
    }
    #qrcode { display: inline-block; }
    #qrcode canvas, #qrcode img { border-radius: 6px; }
    #qrclose {
      margin-top: 14px; padding: 6px 20px;
      font: bold 13px inherit;
      background: rgba(214,72,50,0.12); border: 1.5px solid rgba(214,72,50,0.5);
      border-radius: 20px; color: #D64832; cursor: pointer;
    }
    #jumpctrl {
      position: fixed; top: 62px; left: 10px;
      display: flex; align-items: center; gap: 5px;
      background: rgba(242,239,231,0.72);
      border: 1.5px solid rgba(28,25,21,0.35);
      border-radius: 20px;
      padding: 5px 10px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10;
      user-select: none; -webkit-user-select: none;
    }
    #jumpctrl span {
      font: bold 12px 'Chalkboard SE','Comic Sans MS',cursive;
      color: #5A4828; letter-spacing: 0.5px;
    }
    #jumpctrl .jdots { display: flex; gap: 3px; align-items: center; }
    #jumpctrl .jdots i {
      display: block; width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(28,25,21,0.18);
      transition: background 0.15s;
    }
    #jumpctrl .jdots i.on { background: #D64832; }
    .jbtn {
      background: none; border: none;
      font: bold 17px 'Chalkboard SE','Comic Sans MS',cursive;
      color: #1C1915; cursor: pointer; line-height: 1;
      padding: 0 2px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .jbtn:active { opacity: 0.45; }
    #p2btn {
      position: fixed;
      top: 110px; left: 56px;
      transform: none;
      width: min(15vw,72px); height: min(15vw,72px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(180,40,20,0.55);
      border: 2.5px solid rgba(220,80,40,0.65);
      box-shadow: 0 4px 14px rgba(0,0,0,0.28);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      font: bold min(5.5vw,24px) 'Chalkboard SE','Comic Sans MS',cursive;
      color: #FFF8F0;
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
    }
    #p2btn.active { background: rgba(180,40,20,0.85); border-color: rgba(255,120,60,0.9); }
    #p2btn:active { transform: scale(0.93); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <button id="bleft"  class="ctrl-btn">◀</button>
  <button id="bright" class="ctrl-btn">▶</button>
  <button id="bjump"  class="ctrl-btn">▲</button>
  <button id="btakeout" onclick="takeOut()">¢<span id="bankdisp">0</span></button>
  <button id="bfullscreen" title="Fullscreen">⛶</button>
  <button id="bqr" title="QR Code — play on mobile">📱</button>
  <button id="bmkt" title="Market">🛒</button>
  <button id="bskins" title="Skins">🎨</button>
  <div id="skinsmodal">
    <div id="skinsbox">
      <h2>🎨 Skins</h2>
      <div id="skinslist"></div>
      <button id="skinsclose">Close</button>
    </div>
  </div>
  <div id="mktmodal">
    <div id="mktbox">
      <h2>🛒 Market</h2>
      <div id="mktbalance"></div>
      <div class="mkt-item">
        <span class="mkt-icon">💨</span>
        <div class="mkt-info">
          <div class="mkt-name">Speed Boost</div>
          <div class="mkt-desc">Run 25% faster</div>
        </div>
        <button class="mkt-btn" data-id="speed" data-cost="4">4¢</button>
      </div>
      <div class="mkt-item">
        <span class="mkt-icon">⬆️</span>
        <div class="mkt-info">
          <div class="mkt-name">Triple Jump</div>
          <div class="mkt-desc">3 jumps instead of 2</div>
        </div>
        <button class="mkt-btn" data-id="triple" data-cost="8">8¢</button>
      </div>
      <div class="mkt-item">
        <span class="mkt-icon">🛡️</span>
        <div class="mkt-info">
          <div class="mkt-name">Shield</div>
          <div class="mkt-desc">Survive one star hit per run</div>
        </div>
        <button class="mkt-btn" data-id="shield" data-cost="12">12¢</button>
      </div>
      <div class="mkt-item">
        <span class="mkt-icon">🧲</span>
        <div class="mkt-info">
          <div class="mkt-name">Coin Magnet</div>
          <div class="mkt-desc">Attract coins from farther away</div>
        </div>
        <button class="mkt-btn" data-id="magnet" data-cost="6">6¢</button>
      </div>
      <div style="margin:12px 0 8px;border-top:1.5px solid rgba(28,25,21,0.15);padding-top:10px;font:bold 13px 'Chalkboard SE','Comic Sans MS',cursive;color:#5A4828;">🎭 Operator Skins</div>
      <div id="mkt-skins-list"></div>
      <button id="mktclose">Close</button>
    </div>
  </div>
  <div id="qrmodal">
    <div id="qrbox">
      <p>Scan to play on mobile</p>
      <div id="qrcode"></div>
      <small id="qrurl"></small>
      <br>
      <button id="qrclose">Close</button>
    </div>
  </div>
  <button id="p2btn" title="Add AI player">🤖</button>
  <div id="jumpctrl">
    <span>↑</span>
    <button class="jbtn" id="bjdn">−</button>
    <div class="jdots">
      <i></i><i></i><i></i><i></i><i></i>
    </div>
    <button class="jbtn" id="bjup">+</button>
  </div>

  // ── background sky ────────────────────────────────────────────────
  function drawBG() {
    // ── phase / elevation ─────────────────────────────────────────
    var angle   = dayTime * Math.PI * 2;
    var sunElev = Math.cos(angle);              // +1=noon, -1=midnight
    var dayness = Math.max(0, sunElev);

    // smoothstep interpolation between 4 key palettes
    // index: 0=noon  1=sunset  2=midnight  3=dawn  (4=noon wrap)
    var PALS = [
      [[86,158,220],  [185,220,236], [178,208,148]],  // noon
      [[38,20,90],    [230,84,34],   [124,80,40]],     // sunset
      [[5,8,30],      [10,15,48],    [15,19,13]],      // midnight
      [[46,22,84],    [208,98,60],   [105,76,50]],     // dawn
      [[86,158,220],  [185,220,236], [178,208,148]],   // noon (wrap)
    ];
    var ph  = dayTime * 4;
    var pi  = Math.floor(ph) % 4;
    var pf  = ph - Math.floor(ph);
    pf = pf*pf*(3-2*pf);                        // smoothstep
    var A = PALS[pi], B = PALS[(pi+1)%4];
    function lp(i,j){ return Math.round(A[i][j]+(B[i][j]-A[i][j])*pf); }
    var topCol = [lp(0,0),lp(0,1),lp(0,2)];
    var horCol = [lp(1,0),lp(1,1),lp(1,2)];
    var gndCol = [lp(2,0),lp(2,1),lp(2,2)];

    // altitude modifier — high altitude = more zenith color
    var alt  = Math.max(0, GND - camY);
    var altT = Math.min(alt / 1400, 1);
    var skR  = Math.round(topCol[0]+(horCol[0]-topCol[0])*(1-altT));
    var skG  = Math.round(topCol[1]+(horCol[1]-topCol[1])*(1-altT));
    var skB  = Math.round(topCol[2]+(horCol[2]-topCol[2])*(1-altT));

    var grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, 'rgb('+skR+','+skG+','+skB+')');
    grad.addColorStop(1, 'rgb('+horCol[0]+','+horCol[1]+','+horCol[2]+')');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // ── night stars ───────────────────────────────────────────────
    var starA = Math.max(0, Math.min(1, (1-dayness)*1.6 - 0.35));
    if(starA > 0.02) {
      ctx.save();
      for(var i=0;i<skyStars.length;i++){
        var ss = skyStars[i];
        var twk = 0.55 + 0.45*Math.sin(frame*0.038+ss.phase);
        var a   = starA * ss.br * twk;
        if(a < 0.03) continue;
        ctx.fillStyle = 'rgba('+ss.r+','+ss.g+','+ss.b+','+a.toFixed(3)+')';
        ctx.beginPath(); ctx.arc(ss.x, ss.y, ss.size, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    // ── sun ───────────────────────────────────────────────────────
    var sunX  = W*0.5 + Math.sin(angle)*W*0.38;
    var sunSY = H*0.10 + (1-Math.max(0,sunElev))*H*0.58;
    var sunA  = Math.max(0, Math.min(1, sunElev*2.8 + 0.08));

    if(sunA > 0.02) {
      ctx.save();
      // outer halo
      var hg = ctx.createRadialGradient(sunX,sunSY,0,sunX,sunSY,58);
      hg.addColorStop(0, 'rgba(255,238,130,'+(sunA*0.42).toFixed(3)+')');
      hg.addColorStop(0.45,'rgba(255,195,55,'+(sunA*0.15).toFixed(3)+')');
      hg.addColorStop(1,  'rgba(255,155,20,0)');
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(sunX,sunSY,58,0,Math.PI*2); ctx.fill();
      // disc gradient
      var sg = ctx.createRadialGradient(sunX-4,sunSY-4,0,sunX,sunSY,19);
      sg.addColorStop(0,   'rgba(255,252,200,'+sunA.toFixed(3)+')');
      sg.addColorStop(0.55,'rgba(255,218,55,'+ sunA.toFixed(3)+')');
      sg.addColorStop(1,   'rgba(238,175,18,'+ sunA.toFixed(3)+')');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.arc(sunX,sunSY,19,0,Math.PI*2); ctx.fill();
      // sketchy outline
      ctx.strokeStyle = 'rgba(195,138,8,'+(sunA*0.42).toFixed(3)+')';
      ctx.lineWidth = 1.3;
      sCirc(sunX, sunSY, 19);
      // animated rays
      ctx.strokeStyle = 'rgba(255,218,75,'+(sunA*0.30).toFixed(3)+')';
      ctx.lineWidth = 1.1; ctx.lineCap = 'round';
      for(var i=0;i<8;i++){
        var ra = i*Math.PI/4 + frame*0.005;
        var r1 = 23, r2 = 30+Math.sin(frame*0.055+i*1.1)*3;
        sLine(sunX+Math.cos(ra)*r1,sunSY+Math.sin(ra)*r1,
              sunX+Math.cos(ra)*r2,sunSY+Math.sin(ra)*r2, 0.4);
      }
      ctx.restore();
    }

    // ── moon ──────────────────────────────────────────────────────
    var moonElev = -sunElev;
    var moonX  = W*0.5 - Math.sin(angle)*W*0.38;
    var moonSY = H*0.10 + (1-Math.max(0,moonElev))*H*0.58;
    var moonA  = Math.max(0, Math.min(1, moonElev*2.8 + 0.08));

    if(moonA > 0.02) {
      ctx.save();
      // glow halo
      var mg = ctx.createRadialGradient(moonX,moonSY,0,moonX,moonSY,42);
      mg.addColorStop(0,'rgba(195,205,238,'+(moonA*0.28).toFixed(3)+')');
      mg.addColorStop(1,'rgba(175,188,228,0)');
      ctx.fillStyle = mg;
      ctx.beginPath(); ctx.arc(moonX,moonSY,42,0,Math.PI*2); ctx.fill();
      // full disc
      ctx.fillStyle = 'rgba(228,232,245,'+moonA.toFixed(3)+')';
      ctx.beginPath(); ctx.arc(moonX,moonSY,16,0,Math.PI*2); ctx.fill();
      // crescent shadow (sky-coloured overlay offset toward sun)
      var csx = sunX - moonX, csy = sunSY - moonSY;
      var csl = Math.sqrt(csx*csx+csy*csy)+0.001;
      var cox = (csx/csl)*7, coy = (csy/csl)*6;
      ctx.fillStyle = 'rgba('+skR+','+skG+','+skB+','+(moonA*0.80).toFixed(3)+')';
      ctx.beginPath(); ctx.arc(moonX+cox,moonSY+coy,13,0,Math.PI*2); ctx.fill();
      // craters
      ctx.fillStyle = 'rgba(178,184,208,'+(moonA*0.52).toFixed(3)+')';
      ctx.beginPath(); ctx.arc(moonX-5,moonSY+3,2.6,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(moonX-1,moonSY-5,1.8,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(moonX+4,moonSY+6,1.4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(moonX+2,moonSY-1,1.0,0,Math.PI*2); ctx.fill();
      // sketchy rim
      ctx.strokeStyle = 'rgba(155,165,198,'+(moonA*0.32).toFixed(3)+')';
      ctx.lineWidth = 1.0;
      sCirc(moonX, moonSY, 16);
      ctx.restore();
    }

    // ── grass strip ───────────────────────────────────────────────
    var gy = sy(GND);
    if(gy < H+4) {
      ctx.fillStyle = 'rgb('+gndCol[0]+','+gndCol[1]+','+gndCol[2]+')';
      ctx.fillRect(0, gy, W, H - gy + 4);
    }
  }

      if(cy2 < -sz*3 || cy2 > H+sz*2) continue;

      var puffs = [[0,0,sz],[sz*.58,-sz*.16,sz*.68],[-sz*.5,sz*.08,sz*.58],[sz*.2,sz*.16,sz*.5]];
      ctx.fillStyle = 'rgba(248,245,240,'+alpha+')';
      for(var j=0;j<puffs.length;j++){
        ctx.beginPath();
        ctx.arc(cx2+puffs[j][0], cy2+puffs[j][1], puffs[j][2], 0, Math.PI*2);

      ctx.strokeStyle = 'rgba(168,158,148,'+(c.layer===0?0.18:0.28)+')';
      ctx.lineWidth = 1;
      sCirc(cx2, cy2, sz);
    }
    ctx.restore();

  function scheduleOsc(type,freq,t0,dur,vol) {
    if(!audioCtx||!freq) return;

    env.gain.setValueAtTime(vol,t0+dur-0.05);
    env.gain.linearRampToValueAtTime(0,t0+dur);
    osc.start(t0); osc.stop(t0+dur+0.02);
  }

  function playKick(t) {
    if(!audioCtx) return;
    // Deep punchy kick
    var osc=audioCtx.createOscillator(), env=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(180,t);
    osc.frequency.exponentialRampToValueAtTime(42,t+0.22);
    osc.connect(env); env.connect(masterComp);
    env.gain.setValueAtTime(1.1,t); env.gain.exponentialRampToValueAtTime(0.001,t+0.38);
    osc.start(t); osc.stop(t+0.40);
    // soft click
    var cl=audioCtx.createOscillator(), cenv=audioCtx.createGain();
    cl.type='triangle'; cl.frequency.value=900;
    cl.connect(cenv); cenv.connect(masterComp);
    cenv.gain.setValueAtTime(0.14,t); cenv.gain.exponentialRampToValueAtTime(0.001,t+0.008);
    cl.start(t); cl.stop(t+0.01);
  }

  function playSnare(t) {
    if(!audioCtx) return;
    // Snappy snare with more body
    var len=Math.round(audioCtx.sampleRate*0.18);
    var buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
    var ns=audioCtx.createBufferSource(); ns.buffer=buf;
    var bpf=audioCtx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=1600; bpf.Q.value=0.8;
    var ne=audioCtx.createGain();
    ns.connect(bpf); bpf.connect(ne); ne.connect(masterComp);
    ne.gain.setValueAtTime(0.82,t); ne.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    ns.start(t); ns.stop(t+0.18);
    // rim tone
    var tn=audioCtx.createOscillator(), te=audioCtx.createGain();
    tn.type='triangle'; tn.frequency.setValueAtTime(240,t); tn.frequency.exponentialRampToValueAtTime(160,t+0.06);
    tn.connect(te); te.connect(masterComp);
    te.gain.setValueAtTime(0.28,t); te.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    tn.start(t); tn.stop(t+0.10);
  }

  function playHat(t, vol, open) {
    if(!audioCtx) return;
    var dur = open ? 0.14 : 0.04;
    var len=Math.round(audioCtx.sampleRate*dur);
    var buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
    var ns=audioCtx.createBufferSource(); ns.buffer=buf;
    var hpf=audioCtx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=8500;
    var env=audioCtx.createGain();
    ns.connect(hpf); hpf.connect(env); env.connect(masterComp);
    env.gain.setValueAtTime(vol||0.12,t); env.gain.exponentialRampToValueAtTime(0.001,t+dur);
    ns.start(t); ns.stop(t+dur+0.01);
  }

  // Deep smooth bass — G-funk style with slide
  function play808(freq,t,dur) {
    if(!audioCtx||!freq) return;
    var osc=audioCtx.createOscillator(), env=audioCtx.createGain();
    var lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=320;
    osc.type='sine'; osc.frequency.setValueAtTime(freq,t);
    osc.connect(lpf); lpf.connect(env); env.connect(masterComp);
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(0.55,t+0.01);
    env.gain.setValueAtTime(0.55,t+dur*0.75);
    env.gain.linearRampToValueAtTime(0,t+dur);
    osc.start(t); osc.stop(t+dur+0.02);
  }

  // G-funk synth whistle — high sine with vibrato
  function playWhistle(freq,t,dur) {
    if(!audioCtx||!freq) return;
    var osc=audioCtx.createOscillator();
    var vib=audioCtx.createOscillator();
    var vibGain=audioCtx.createGain();
    var env=audioCtx.createGain();
    osc.type='sine'; osc.frequency.setValueAtTime(freq,t);
    // vibrato: 5Hz, ±8 cents
    vib.frequency.value=5; vibGain.gain.value=freq*0.015;
    vib.connect(vibGain); vibGain.connect(osc.frequency);
    osc.connect(env); env.connect(masterComp);
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(0.18,t+0.04);
    env.gain.setValueAtTime(0.18,t+dur-0.08);
    env.gain.linearRampToValueAtTime(0,t+dur);
    osc.start(t); osc.stop(t+dur+0.02);
    vib.start(t); vib.stop(t+dur+0.02);
  }

  // Funk guitar stab — short bright chord hit
  function playFunkStab(t) {
    if(!audioCtx) return;
    var freqs=[196,247,294]; // G minor chord
    freqs.forEach(function(f){
      var osc=audioCtx.createOscillator(), env=audioCtx.createGain();
      var lpf=audioCtx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=2400;
      osc.type='sawtooth'; osc.frequency.value=f*2;
      osc.connect(lpf); lpf.connect(env); env.connect(masterComp);
      env.gain.setValueAtTime(0.07,t); env.gain.exponentialRampToValueAtTime(0.001,t+0.09);
      osc.start(t); osc.stop(t+0.11);
    });
  }

  function scheduleBGM() {
    if(!audioCtx) return;
    var now=audioCtx.currentTime, ahead=0.18;
    while(nextStep<now+ahead) {
      var step=beatStep%32;
      if(kickPat[step])  playKick(nextStep);
      if(snarePat[step]) playSnare(nextStep);
      if(hatPat[step])   playHat(nextStep, 0.10, false);
      if(ohatPat[step])  playHat(nextStep, 0.18, true);
      if(funkPat[step])  playFunkStab(nextStep);
      // smooth bass
      if(bassStepsLeft<=0) {
        var note=bassLine[bassLineIdx%bassLine.length];
        if(note[0]>0) play808(note[0], nextStep, note[1]*S16*0.88);
        bassStepsLeft=note[1];
        bassLineIdx++;
      }
      bassStepsLeft--;
      // G-funk whistle melody
      if(whistleStepsLeft<=0) {
        var wn=whistleLine[whistleIdx%whistleLine.length];
        if(wn[0]>0) playWhistle(wn[0], nextStep, wn[1]*S16*0.84);
        whistleStepsLeft=wn[1];
        whistleIdx++;
      }
      whistleStepsLeft--;
      nextStep+=S16;
      beatStep++;
    }
    setTimeout(scheduleBGM,55);
  }

  function initAudio() {
    if(audioCtx){if(audioCtx.state==='suspended')audioCtx.resume();return;}
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterComp=audioCtx.createDynamicsCompressor();
    masterComp.threshold.value=-16; masterComp.knee.value=6;
    masterComp.ratio.value=4; masterComp.attack.value=0.003; masterComp.release.value=0.12;
    masterLPF=audioCtx.createBiquadFilter(); masterLPF.type='lowpass'; masterLPF.frequency.value=16000;
    masterGain=audioCtx.createGain(); masterGain.gain.value=0.52;
    masterComp.connect(masterLPF); masterLPF.connect(masterGain); masterGain.connect(audioCtx.destination);
    beatStep=0; nextStep=audioCtx.currentTime+0.1; bassLineIdx=0; bassStepsLeft=0; whistleIdx=0; whistleStepsLeft=0; funkIdx=0; funkStepsLeft=0;
    scheduleBGM();
  }

  function playJumpSFX() {
    if(!audioCtx) return;
    var t=audioCtx.currentTime;
    var osc=audioCtx.createOscillator(), env=audioCtx.createGain();
    osc.type='square';
    osc.frequency.setValueAtTime(300,t);
    osc.frequency.exponentialRampToValueAtTime(740,t+0.07);
    osc.connect(env); env.connect(masterComp);
    env.gain.setValueAtTime(0.13,t); env.gain.exponentialRampToValueAtTime(0.001,t+0.09);
    osc.start(t); osc.stop(t+0.10);
  }

  function playCoinSFX() {
    if(!audioCtx) return;
    var t=audioCtx.currentTime;
    scheduleOsc('square',880,t,0.04,0.10);
    scheduleOsc('square',1100,t+0.034,0.04,0.08);
  }

  function playDeathSFX() {
    if(!audioCtx) return;
    var t=audioCtx.currentTime;
    scheduleOsc('square',440,t,0.08,0.11);
    scheduleOsc('square',330,t+0.07,0.09,0.10);
    scheduleOsc('square',220,t+0.15,0.12,0.09);
    scheduleOsc('square',165,t+0.26,0.18,0.08);
  }

  // ── coins ─────────────────────────────────────────────────────────
  function drawCoin(cx, cy) {
    ctx.save();
    ctx.fillStyle = '#C8A018';
    ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,236,100,0.72)';
    ctx.beginPath(); ctx.arc(cx-2.2,cy-2.2,3.8,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#7A5808';
    ctx.lineWidth = 1.6;
    sCirc(cx, cy, 8);
    ctx.restore();
  }

  function drawCoins() {
    for(var j=0;j<coins.length;j++){
      var cn=coins[j];
      var csy=sy(cn.wy);
      if(csy<-20||csy>H+20) continue;

  function drawPenny(cx, cy) {

  function drawPopups() {

    for(var i=0;i<popups.length;i++){
      var pp=popups[i];

  // ── draw hazard star obstacle ──────────────────────────────────────
  function drawStar(cx,cy2,rot) {
    ctx.save();
    var outerR=17, innerR=7, pts=5;

    // pulsing outer glow
    var pulse = 0.5 + 0.5*Math.sin(rot*2.8);
    var glowR = outerR + 6 + pulse*5;
    var grd = ctx.createRadialGradient(cx,cy2,0,cx,cy2,glowR);
    grd.addColorStop(0,'rgba(255,110,40,0.60)');
    grd.addColorStop(0.5,'rgba(200,30,10,0.22)');
    grd.addColorStop(1,'rgba(180,10,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(cx,cy2,glowR,0,Math.PI*2); ctx.fill();

    // 5-pointed star body
    ctx.beginPath();
    for(var i=0;i<pts*2;i++){
      var ang = (i*Math.PI/pts) + rot;
      var rr  = i%2===0 ? outerR : innerR;
      if(i===0) ctx.moveTo(cx+rr*Math.cos(ang), cy2+rr*Math.sin(ang));
      else       ctx.lineTo(cx+rr*Math.cos(ang), cy2+rr*Math.sin(ang));
    }
    ctx.closePath();
    var sg = ctx.createRadialGradient(cx-5,cy2-5,0,cx,cy2,outerR);
    sg.addColorStop(0,'#FF7848');
    sg.addColorStop(0.42,'#D64832');
    sg.addColorStop(1,'#640C08');
    ctx.fillStyle = sg;
    ctx.fill();

    // sketchy danger outline
    ctx.strokeStyle='#3A0606'; ctx.lineWidth=1.9; ctx.lineCap='round';
    ctx.stroke();

    // soft highlight pass on the star edge
    ctx.save();
    ctx.globalAlpha = 0.26;
    ctx.strokeStyle = '#FFA070'; ctx.lineWidth = 0.9;
    ctx.beginPath();
    for(var i=0;i<pts*2;i++){
      var ang = (i*Math.PI/pts) + rot;
      var rr  = i%2===0 ? outerR : innerR;
      if(i===0) ctx.moveTo(cx+rr*Math.cos(ang), cy2+rr*Math.sin(ang));
      else       ctx.lineTo(cx+rr*Math.cos(ang), cy2+rr*Math.sin(ang));
    }
    ctx.closePath(); ctx.stroke();
    ctx.restore();

    // bright spark at each point tip
    for(var i=0;i<pts;i++){
      var ang = (i*2*Math.PI/pts) + rot;
      ctx.beginPath();
      ctx.arc(cx+outerR*Math.cos(ang), cy2+outerR*Math.sin(ang), 1.9, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,210,110,0.72)';
      ctx.fill();
    }

    // inner ring detail
    ctx.beginPath(); ctx.arc(cx,cy2,innerR-1,0,Math.PI*2);
    ctx.strokeStyle = 'rgba(255,80,20,0.28)'; ctx.lineWidth = 0.7; ctx.stroke();

    // dark center socket
    ctx.beginPath(); ctx.arc(cx,cy2,5.5,0,Math.PI*2);
    ctx.fillStyle = '#0C0202'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,70,20,0.55)'; ctx.lineWidth = 0.8; ctx.stroke();

    // ember glow core
    ctx.beginPath(); ctx.arc(cx,cy2,2.2,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,175,65,0.92)'; ctx.fill();

    // X danger mark
    ctx.strokeStyle = 'rgba(255,90,30,0.95)';
    ctx.lineWidth = 1.3; ctx.lineCap = 'round';
    sLine(cx-3,cy2-3,cx+3,cy2+3,0.2);
    sLine(cx+3,cy2-3,cx-3,cy2+3,0.2);

    ctx.restore();
  }

  // ── platform + star generation ────────────────────────────────────
  function genPlats(toWY) {
    while(topWY > toWY) {
      topWY -= 72 + Math.random()*68;
      var pw = 90 + Math.random()*140;
      var x1 = 10 + Math.random()*(W-pw-20);
      var tilt = (Math.random()-.5)*8;
      plats.push({x1:x1, x2:x1+pw, wy:topWY, tilt:tilt});

      if(topWY < GND - 200 && Math.random() < 0.55) {
        var sxPos = 30 + Math.random()*(W-60);
        var amp   = 25 + Math.random()*50;
        var spd   = 0.018 + Math.random()*0.024;
        stars.push({
          wx:   sxPos,
          wy:   topWY - 30 - Math.random()*55,
          amp:  amp,
          spd:  spd,
          phase: Math.random()*Math.PI*2
        });
      }

      // pennies: rare single copper coin, saves to bank
      if(topWY < GND - 150 && Math.random() < 0.30) {
        pennies.push({
          wx: x1 + 15 + Math.random()*Math.max(0, pw-30),
          wy: topWY - 34 - Math.random()*26,
          phase: Math.random()*Math.PI*2
        });
      }

      // coins: 1-3 in a row hovering above the platform
      if(topWY < GND - 60 && Math.random() < 0.72) {
        var cnt = 1 + Math.floor(Math.random()*3);
        var cx0 = x1 + 20 + Math.random()*Math.max(0, pw-40);
        var cwy = topWY - 28 - Math.random()*24;
        for(var ci=0; ci<cnt; ci++) {
          coins.push({wx: cx0 + (ci-(cnt-1)/2)*22, wy: cwy, phase: Math.random()*Math.PI*2});
        }
      }
    }
  }

  function updateBankDisplay() {
    var el=document.getElementById('bankdisp');
    if(el) el.textContent=pennyBank;
  }

  function buildWorld() {
    plats=[]; stars=[]; coins=[]; pennies=[]; topWY=GND;
    plats.push({x1:-10, x2:W+10, wy:GND, tilt:0});
    genPlats(GND - H*2.8);
    topCloudWY=GND; clouds=[];
    genClouds(GND - H*3);
  }

  function respawn() {
    px=W*.25; py=GND; pvx=0; pvy=0;
    onG=true; jLeft=2;
    score=0; coinCount=0; pennyCount=0; frame=0; dead=false;
    popups=[];
    buildWorld();
    camY = GND - H*0.88;
  }

  function spawnP2() {
    p2x=px+60; p2y=py; p2vx=0; p2vy=0;
    p2onG=true; p2jLeft=2; p2dead=false;
    p2frame=0; p2score=0; p2dir=0; p2stuckTimer=0; p2respawnTimer=0;
  }

  function updateP2() {
    if(!p2active) return;
    if(p2dead) {
      p2respawnTimer++;
      if(p2respawnTimer > 150) spawnP2();
      return;
    }
    p2frame++;

    // ── AI thinking (every 22 frames) ─────────────────────────────
    p2aiTick++;
    if(p2aiTick >= 22) {
      p2aiTick = 0;

      // threat: nearest hazard star
      var threat=null, minD=110;
      for(var j=0;j<stars.length;j++){
        var s=stars[j];
        var ssx=s.wx+Math.sin(frame*s.spd+s.phase)*s.amp;
        var dx2=p2x-ssx, dy2=p2y-s.wy;
        var d=Math.sqrt(dx2*dx2+dy2*dy2);
        if(d<minD){minD=d; threat={x:ssx,y:s.wy};}
      }
      if(threat) {
        p2dir = p2x>threat.x ? 1 : -1;
        if(p2jLeft>0){ p2vy=JVY; p2jLeft--; p2onG=false; playJumpSFX(); }
      } else {
        // find best platform above
        var bestP=null, bestV=-Infinity;
        for(var i=0;i<plats.length;i++){
          var pl=plats[i];
          if(pl.wy >= p2y-8) continue;
          var pcx=(pl.x1+pl.x2)*0.5;
          var ddy=p2y-pl.wy, ddx=Math.abs(pcx-p2x);
          var val=(pl.x2-pl.x1)*0.25 - ddy*0.12 - ddx*0.7;
          if(val>bestV){bestV=val;bestP=pl;}
        }
        if(bestP){
          var pcx=(bestP.x1+bestP.x2)*0.5;
          var ddx=pcx-p2x;
          p2dir = Math.abs(ddx)>12 ? (ddx>0?1:-1) : 0;
          if(p2onG && p2jLeft>0 && bestP.wy < p2y-18){
            p2vy=JVY; p2jLeft--; p2onG=false; p2stuckTimer=0; playJumpSFX();
          }
        } else {
          if(Math.random()<0.04) p2dir=Math.random()<0.5?1:-1;
        }
      }

      // double-jump when falling
      if(!p2onG && p2jLeft>0 && p2vy>5 && Math.random()<0.12){
        p2vy=JVY*0.82; p2jLeft--; playJumpSFX();
      }
    }

    // stuck on ground too long → force jump
    if(p2onG) p2stuckTimer++; else p2stuckTimer=0;
    if(p2stuckTimer>55 && p2jLeft>0){
      p2vy=JVY; p2jLeft--; p2onG=false; p2stuckTimer=0; playJumpSFX();
    }

    // ── physics ───────────────────────────────────────────────────
    var p2spd=SPD*0.9;
    if(p2dir>0) p2vx+=0.9; else if(p2dir<0) p2vx-=0.9; else p2vx*=0.74;
    p2vx=Math.max(-p2spd,Math.min(p2spd,p2vx));
    p2x+=p2vx;
    if(p2x<-20) p2x=W+20; if(p2x>W+20) p2x=-20;

    var prevP2y=p2y;
    p2vy+=GRAV; p2y+=p2vy;
    if(p2vy>0){
      p2onG=false;
      for(var i=0;i<plats.length;i++){
        var pl=plats[i];
        if((p2x+10>=pl.x1&&p2x-10<=pl.x2)&&prevP2y<=pl.wy&&p2y>=pl.wy-1){
          p2y=pl.wy; p2vy=0; p2onG=true; p2jLeft=2; break;
        }
      }
    }

    // star collision
    for(var j=0;j<stars.length;j++){
      var s=stars[j];
      var ssx=s.wx+Math.sin(frame*s.spd+s.phase)*s.amp;
      var dx2=p2x-ssx, dy2=p2y-s.wy;
      if(dx2*dx2+dy2*dy2<14*14){playDeathSFX();p2dead=true;p2respawnTimer=0;return;}
    }
    // fell off bottom
    if(p2y>camY+H+80){playDeathSFX();p2dead=true;p2respawnTimer=0;}

    var h2=Math.max(0,GND-p2y);
    p2score=Math.max(p2score,Math.floor(h2/8));
  }

  function drawP2Figure() {
    if(!p2active||p2dead) return;
    var x=p2x, gy=sy(p2y);
    if(gy<-90||gy>H+60) return;
    ctx.save();
    ctx.lineCap='round'; ctx.lineJoin='round';

    var hoodC='#111110', bodyC='#0F0F0E', pantC='#0E0E0C', bootC='#0A0806';
    var faceC='#BFBCB0', eyeC='rgba(110,105,88,0.3)', outC='#050504';

    var ph2=Math.floor(p2frame/7)%2;
    var fast2=Math.abs(p2vx)>0.6;
    var swg2=(p2onG&&Math.abs(p2vx)>0.3)?(ph2?(fast2?12:6):-(fast2?12:6)):0;

    var headY=gy-52, shldrY=gy-39, hipY=gy-19, kneeY=gy-9, footY=gy;

    // legs
    ctx.lineWidth=4; ctx.strokeStyle=pantC;
    if(!p2onG){
      sLine(x-5,hipY,x-8,kneeY+1,0.6); sLine(x-8,kneeY+1,x-5,footY-6,0.6);
      sLine(x+5,hipY,x+8,kneeY-1,0.6); sLine(x+8,kneeY-1,x+10,footY-8,0.6);
    } else {
      var lkx2=x-4+swg2*0.5, lfx2=x-2+swg2;
      var rkx2=x+4-swg2*0.5, rfx2=x+2-swg2;

    ctx.fillStyle='#0C0C0A'; ctx.strokeStyle=outC; ctx.lineWidth=1.2;

    // Ghost two white stripes

    for(var t2=-2;t2<=2;t2++){

  // ── button controls ───────────────────────────────────────────────
  var lHeld=false, rHeld=false;

  function bindBtn(id, onDown, onUp) {
    var el = document.getElementById(id);
    el.addEventListener('mousedown',  function(e){e.preventDefault(); onDown();});
    el.addEventListener('mouseup',    function(e){e.preventDefault(); onUp();});
    el.addEventListener('mouseleave', function(){onUp();});
    el.addEventListener('touchstart', function(e){e.preventDefault(); onDown();},{passive:false});
    el.addEventListener('touchend',   function(e){e.preventDefault(); onUp();},{passive:false});
    el.addEventListener('touchcancel',function(){onUp();});
  }
  bindBtn('bleft',  function(){lHeld=true;},  function(){lHeld=false;});
  bindBtn('bright', function(){rHeld=true;},  function(){rHeld=false;});
  document.getElementById('bjdn').addEventListener('click', function(){ setJumpLvl(jumpLvl-1); });
  document.getElementById('bjup').addEventListener('click', function(){ setJumpLvl(jumpLvl+1); });
  setJumpLvl(jumpLvl); // initialise dots

  document.getElementById('p2btn').addEventListener('click', function(){
    p2active = !p2active;
    this.classList.toggle('active', p2active);
    this.textContent = p2active ? '✕🤖' : '🤖';

  });
  document.getElementById('bjump').addEventListener('mousedown',  function(e){e.preventDefault(); doJump();});
  document.getElementById('bjump').addEventListener('touchstart', function(e){e.preventDefault(); doJump();},{passive:false});

  // ── keyboard ──────────────────────────────────────────────────────
  var K=Object.create(null);
  document.addEventListener('keydown',function(e){
    if(K[e.key])return; K[e.key]=true;
    if(e.key===' '||e.key==='ArrowUp'){e.preventDefault(); doJump();}
    if(e.key==='r'||e.key==='R') respawn();
  });
  document.addEventListener('keyup',function(e){K[e.key]=false;});

  function doJump() {
    if(!audioCtx) initAudio();
    else if(audioCtx.state==='suspended') audioCtx.resume();
    if(dead){respawn();return;}
    if(jLeft>0){pvy=JVY; jLeft--; onG=false; playJumpSFX();}
  }
  function goLeft()  {return K['ArrowLeft'] ||K['a']||K['A']||lHeld;}
  function goRight() {return K['ArrowRight']||K['d']||K['D']||rHeld;}

  // ── update ────────────────────────────────────────────────────────
  function update() {
    if(dead) return;
    frame++;
    dayTime = (dayTime + 0.00015) % 1.0;

    // Horizontal
    if(goLeft())       pvx -= 0.9;
    else if(goRight()) pvx += 0.9;
    else               pvx *= 0.74;
    pvx = Math.max(-effectiveSpd(), Math.min(effectiveSpd(), pvx));
    px += pvx;
    if(px < -20)  px = W+20;
    if(px > W+20) px = -20;

    // Vertical
    var prevPy = py;
    pvy += GRAV;
    py  += pvy;

    // Platform landing
    if(pvy > 0) {
      onG = false;
      for(var i=0; i<plats.length; i++) {
        var p = plats[i];
        if((px+10 >= p.x1 && px-10 <= p.x2) && prevPy <= p.wy && py >= p.wy-1) {
          py=p.wy; pvy=0; onG=true; jLeft=maxJumps(); break;
        }
      }
    }

    // Coin collection (radius 16)
    for(var j=coins.length-1; j>=0; j--) {
      var cn=coins[j];
      var cdx=px-cn.wx, cdy=(py-25)-cn.wy;
      if(cdx*cdx+cdy*cdy < coinRadius()) {
        coinCount++;
        popups.push({wx:cn.wx, wy:cn.wy, life:1.0, text:'+1', col:'#9A7808'});
        playCoinSFX();
        coins.splice(j,1);
      }
    }

    // Penny collection (radius 14)
    for(var j=pennies.length-1; j>=0; j--) {
      var pn=pennies[j];
      var pdx=px-pn.wx, pdy=(py-25)-pn.wy;
      if(pdx*pdx+pdy*pdy < 38*38) {
        pennyCount++; pennyBank++;
        localStorage.setItem('penny_bank', pennyBank);
        updateBankDisplay();
        popups.push({wx:pn.wx, wy:pn.wy, life:1.3, text:'1¢', col:'#7A3808'});
        playCoinSFX();
        pennies.splice(j,1);
      }
    }

    // Popup floaters
    for(var pi=popups.length-1;pi>=0;pi--){
      popups[pi].wy -= 0.9;
      popups[pi].life -= 0.032;
      if(popups[pi].life<=0) popups.splice(pi,1);
    }

    // Star collision (radius 20)
    for(var j=0; j<stars.length; j++) {
      var s = stars[j];
      var ssx = s.wx + Math.sin(frame*s.spd + s.phase)*s.amp;
      var dx = px - ssx, dy = (py-26) - s.wy;
      if(dx*dx + dy*dy < 20*20) {
        if(shieldActive) { shieldActive=false; continue; }
        playDeathSFX(); dead=true; return;
      }
    }

    // Score
    var h = Math.max(0, GND - py);
    if(Math.floor(h/8) > score) score = Math.floor(h/8);
    if(score > best) {
      best = score;
      localStorage.setItem('best_score', best);
      newBestFlash = 180;
    }
    if(newBestFlash > 0) newBestFlash--;

    // Camera: only moves up
    var tc = py - H*0.44;
    if(tc < camY) camY += (tc-camY)*0.1;

    // Generate above
    genPlats(camY - H*0.4);  // also seeds coins inside genPlats
    genClouds(camY - H*0.6);

    // Cull below
    for(var i=plats.length-1;i>=0;i--){
      if(plats[i].wy > camY+H+120) plats.splice(i,1);
    }
    for(var j=stars.length-1;j>=0;j--){
      if(stars[j].wy > camY+H+120) stars.splice(j,1);
    }
    for(var j=coins.length-1;j>=0;j--){
      if(coins[j].wy > camY+H+120) coins.splice(j,1);
    }
    for(var j=pennies.length-1;j>=0;j--){
      if(pennies[j].wy > camY+H+120) pennies.splice(j,1);
    }
    for(var ci=clouds.length-1;ci>=0;ci--){
      var cc=clouds[ci];
      var pf=cc.layer===0?0.52:0.78;
      if(cc.wy - camY*pf > H + cc.size*2 + 60) clouds.splice(ci,1);
    }

    // Death: fell off bottom
    if(py > camY+H+80) { playDeathSFX(); dead=true; }

    updateP2();
  }

  // ── draw ──────────────────────────────────────────────────────────
  function sy(wy) { return wy - camY; }

  function drawPlats() {
    for(var i=0;i<plats.length;i++){
      var p = plats[i];
      var y1=sy(p.wy), y2=sy(p.wy+p.tilt);
      if(Math.min(y1,y2)>H+8 || Math.max(y1,y2)<-8) continue;
      ctx.save();
      var dayness = Math.max(0, Math.cos(dayTime * Math.PI * 2));
      var pc = Math.round(255 * (1 - dayness));
      ctx.strokeStyle = 'rgb('+pc+','+pc+','+pc+')';
      ctx.lineWidth = (p.x2-p.x1)>400 ? 1.8 : 2.8;
      ctx.lineCap='round';
      sLine(p.x1, y1, p.x2, y2, 1.5);
      ctx.restore();
    }
  }

  function drawStars() {
    for(var j=0;j<stars.length;j++){
      var s = stars[j];
      var ssx = s.wx + Math.sin(frame*s.spd + s.phase)*s.amp;
      var ssy = sy(s.wy);
      if(ssy < -30 || ssy > H+30) continue;
      drawStar(ssx, ssy, frame*s.spd*5 + s.phase);
    }
  }

  function drawFigure() {
    var x=px, gy=sy(py);
    if(gy<-90||gy>H+60) return;
    ctx.save();
    ctx.lineCap='round'; ctx.lineJoin='round';

    var sk = SKINS[currentSkin] || SKINS.ghost;
    var hoodCol   = dead ? '#2C2C2A' : sk.helmet;
    var skullCol  = dead ? '#6A6858' : sk.mask;
    var socketCol = dead ? '#3A3828' : sk.socket;
    var vestCol   = dead ? '#1C1C1A' : sk.vest;
    var scarfCol  = dead ? '#1C1C1A' : sk.scarf;
    var rifleCol  = dead ? '#2C2C28' : sk.rifle;
    var pantCol   = dead ? '#181614' : sk.pant;
    var bootCol   = dead ? '#0E0C0A' : sk.boot;
    var outlineCol= '#050504';

    var ph   = Math.floor(frame/7)%2;
    var fast = Math.abs(pvx)>0.6;
    var swg  = (onG && Math.abs(pvx)>0.3) ? (ph ? (fast?12:6) : -(fast?12:6)) : 0;
    var eyeDir = pvx>0.5?1 : pvx<-0.5?-1 : 0;

    // anchors (slightly larger silhouette)
    var headY  = gy-52;
    var shldrY = gy-39;
    var hipY   = gy-19;
    var kneeY  = gy-9;
    var footY  = gy;

    // ── rifle held across chest ────────────────────────────────────
    ctx.save();
    var rAngle = dead ? 0.75 : (!onG ? -0.18 : -0.08-swg*0.008);
    ctx.translate(x+3, shldrY+9); ctx.rotate(rAngle);
    // stock
    ctx.fillStyle=rifleCol; ctx.strokeStyle=outlineCol; ctx.lineWidth=1.4;
    ctx.fillRect(-22,-4,9,7); ctx.strokeRect(-22,-4,9,7);
    // receiver
    ctx.fillRect(-13,-3.5,24,6); ctx.strokeRect(-13,-3.5,24,6);
    // barrel
    ctx.strokeStyle=rifleCol; ctx.lineWidth=3;
    sLine(11,-0.5,26,-0.5,0.3);
    ctx.strokeStyle=outlineCol; ctx.lineWidth=0.9;
    sLine(11,-3,26,-3,0.2); sLine(11,2,26,2,0.2);
    // suppressor tip
    ctx.fillStyle='#1A1A14'; ctx.fillRect(22,-2.5,5,4); ctx.strokeRect(22,-2.5,5,4);
    // mag
    ctx.fillStyle=rifleCol; ctx.strokeStyle=outlineCol; ctx.lineWidth=1.2;
    ctx.fillRect(-1,2.5,5,9); ctx.strokeRect(-1,2.5,5,9);
    // rail / scope
    ctx.fillStyle='#303028'; ctx.fillRect(2,-6.5,8,3); ctx.strokeRect(2,-6.5,8,3);
    ctx.restore();

    // ── legs ──────────────────────────────────────────────────────
    ctx.lineWidth=4; ctx.strokeStyle=pantCol;
    if(dead){
      sLine(x-5,hipY,x-18,footY+11,0.8);
      sLine(x+5,hipY,x+15,footY+5, 0.8);
    } else if(!onG){
      sLine(x-5,hipY,x-8,kneeY+1,0.6); sLine(x-8,kneeY+1,x-5,footY-6,0.6);

      ctx.lineWidth=4.5; ctx.strokeStyle=bootCol;
      sLine(x-18,footY+11,x-27,footY+12,0.5);

      ctx.lineWidth=1.8; ctx.strokeStyle=outlineCol; ctx.lineCap='square';

      // airborne — boots tucked under

      sLine(x+10,footY-10,x+19,footY-7,0.5);

      ctx.fillStyle=bootCol; ctx.strokeStyle=outlineCol; ctx.lineWidth=1.2;

    } else {
      // walking
      var lbx=x-2+swg, rbx=x+2-swg;
      ctx.lineWidth=4.5; ctx.strokeStyle=bootCol;
      sLine(lbx,footY,lbx-9,footY+1,0.5);

      sLine(lbx-8,footY-3,lbx-4,footY-3,0.1);
      sLine(lbx-8,footY-1,lbx-4,footY-1,0.1);

      sLine(lkpx-2,kneeY,lkpx+2,kneeY,0.1);
      sLine(rkpx-2,kneeY,rkpx+2,kneeY,0.1);

    ctx.moveTo(x-11,shldrY); ctx.lineTo(x+11,shldrY);

  function drawHUD() {
    ctx.save();
    var _dn = Math.max(0, Math.cos(dayTime * Math.PI * 2));
    var _pc = Math.round(255 * (1 - _dn));
    var _hudCol = 'rgb('+_pc+','+_pc+','+_pc+')';
    var _subCol = 'rgba('+_pc+','+_pc+','+_pc+',0.55)';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.font='bold 22px "Chalkboard SE","Comic Sans MS",cursive';
    ctx.fillStyle=_hudCol; ctx.fillText(score+' m',14,10);
    if(best>0){
      ctx.font='14px "Chalkboard SE","Comic Sans MS",cursive';
      ctx.fillStyle=_subCol; ctx.fillText('best: '+best,14,38);
    }
    // coin count top-right
    drawCoin(W-52, 16);
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.font='bold 18px "Chalkboard SE","Comic Sans MS",cursive';
    ctx.fillStyle='#7A5808'; ctx.fillText(coinCount, W-20, 16);
    // penny bank below coins
    drawPenny(W-52, 38);
    ctx.fillStyle='#6A3408'; ctx.fillText(pennyBank+'¢', W-20, 38);

    // shield indicator
    if(shieldActive) {
      ctx.font='18px serif'; ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.globalAlpha = 0.7 + 0.3*Math.sin(frame*0.12);
      ctx.fillText('🛡️', 14, 58);
      ctx.globalAlpha = 1;
    }

    // ── NEW BEST banner ───────────────────────────────────────────
    if(newBestFlash > 0) {
      var t = newBestFlash / 180;
      // slide in from top, then fade out in last third
      var slideY = newBestFlash > 150 ? (180-newBestFlash)/30 * H*0.22 : H*0.22;
      var alpha  = newBestFlash < 60 ? newBestFlash/60 : 1;
      var pulse  = 1 + 0.06*Math.sin(frame*0.28);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(W/2, slideY);
      ctx.scale(pulse, pulse);
      // glow backdrop
      ctx.fillStyle = 'rgba(214,72,50,0.22)';
      ctx.beginPath(); ctx.roundRect ? ctx.roundRect(-88,-18,176,36,10) : ctx.rect(-88,-18,176,36);
      ctx.fill();
      // outline
      ctx.strokeStyle = 'rgba(214,72,50,0.7)'; ctx.lineWidth = 1.5;
      ctx.stroke();
      // text shadow
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font = 'bold 22px "Chalkboard SE","Comic Sans MS",cursive';
      ctx.fillText('★ NEW BEST: '+best+' m ★', 1.5, 1.5);
      // text
      ctx.fillStyle = '#FFD040';
      ctx.fillText('★ NEW BEST: '+best+' m ★', 0, 0);
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  function drawDead() {
    ctx.fillStyle='rgba(242,239,231,.86)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 46px "Chalkboard SE","Comic Sans MS",cursive';
    ctx.fillStyle='#D64832'; ctx.fillText('You fell!',W/2,H/2-40);
    ctx.font='22px "Chalkboard SE","Comic Sans MS",cursive';
    ctx.fillStyle='#1C1915'; ctx.fillText(score+' m',W/2,H/2+10);
    if(best>0){
      ctx.font='16px "Chalkboard SE","Comic Sans MS",cursive';
      ctx.fillStyle='#8A8278'; ctx.fillText('best: '+best,W/2,H/2+40);
    }
    if(coinCount>0){
      ctx.font='15px "Chalkboard SE","Comic Sans MS",cursive';
      ctx.fillStyle='#7A5808'; ctx.fillText('coins: '+coinCount,W/2,H/2+60);
    }
    if(pennyCount>0){
      ctx.font='15px "Chalkboard SE","Comic Sans MS",cursive';
      ctx.fillStyle='#7A3808'; ctx.fillText('+'+pennyCount+'¢ saved  —  bank: '+pennyBank+'¢ total',W/2,H/2+82);
    }
    var pulse = 0.65+0.35*Math.abs(Math.sin(frame*.04));
    ctx.globalAlpha=pulse;
    ctx.font='bold 20px "Chalkboard SE","Comic Sans MS",cursive';
    ctx.fillStyle='#D64832'; ctx.fillText('Press JUMP to try again',W/2,H/2+110);
    ctx.globalAlpha=1;
  }

  function render() {
    drawBG();
    drawClouds();
    ctx.drawImage(gn,0,0);
    drawPlats();
    drawCoins();
    drawPennies();
    drawStars();
    drawFigure();
    drawP2Figure();
    drawPopups();
    if(dead) drawDead();
    else     drawHUD();
  }

  function takeOut() {
    if(pennyBank===0){ alert('No pennies in the bank yet!'); return; }
    var had=pennyBank;
    pennyBank=0; localStorage.setItem('penny_bank',0);
    updateBankDisplay();
    alert('You took out '+had+'¢! Bank is now empty.');
  }

  updateBankDisplay();

  // ── fullscreen ────────────────────────────────────────────────────
  var fsBtn = document.getElementById('bfullscreen');
  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }
  function updateFsIcon() {
    fsBtn.textContent = isFullscreen() ? '✕' : '⛶';
    fsBtn.title = isFullscreen() ? 'Exit fullscreen' : 'Fullscreen';
  }
  fsBtn.addEventListener('click', function() {
    if (!isFullscreen()) {
      var el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', updateFsIcon);
  document.addEventListener('webkitfullscreenchange', updateFsIcon);

  // ── market upgrades ───────────────────────────────────────────────
  var MKT_ITEMS = {
    speed:  { cost: 4,  key: 'mkt_speed'  },
    triple: { cost: 8,  key: 'mkt_triple' },
    shield: { cost: 12, key: 'mkt_shield' },
    magnet: { cost: 6,  key: 'mkt_magnet' }
  };
  function mktOwned(id) { return +localStorage.getItem(MKT_ITEMS[id].key) === 1; }

  // Apply speed upgrade
  function effectiveSpd() { return mktOwned('speed') ? SPD * 1.25 : SPD; }
  // Apply magnet upgrade
  function coinRadius()   { return mktOwned('magnet') ? 75*75 : 40*40; }
  // Triple jump: applied on respawn/landing (see patched sections below)
  function maxJumps()     { return mktOwned('triple') ? 3 : 2; }

  // Shield state (reset each run)
  var shieldActive = false;
  var origRespawn = respawn;
  respawn = function() {
    origRespawn();
    shieldActive = mktOwned('shield');
    jLeft = maxJumps();
  };
  // also patch initial spawn
  shieldActive = mktOwned('shield');
  jLeft = maxJumps();

  (function loop(){ update(); render(); requestAnimationFrame(loop); })();
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
  // ── market + skins UI ────────────────────────────────────────────
  (function() {
    var mktModal = document.getElementById('mktmodal');

    function renderSkinSlot(id) {
      var s    = SKINS[id];
      var owns = skinOwned(id);
      var isEq = currentSkin === id;
      var btnClass, btnText;
      if (isEq)                   { btnClass='mkt-btn owned'; btnText='✓ On'; }
      else if (owns)              { btnClass='mkt-btn buy';   btnText='Equip'; }
      else if (pennyBank>=s.cost) { btnClass='mkt-btn buy';   btnText=s.cost+'¢'; }
      else                        { btnClass='mkt-btn broke'; btnText=s.cost+'¢'; }
      var previewMask = s.headType==='hood' ? s.hoodCol||s.helmet : s.mask;
      return '<div class="mkt-item" style="padding:7px 10px;margin-bottom:6px" data-skin="'+id+'">' +
        '<div style="width:26px;height:32px;border-radius:5px;background:'+s.helmet+';flex-shrink:0;' +
             'display:flex;align-items:flex-end;justify-content:center;border:1px solid rgba(0,0,0,0.28)">' +
          '<div style="width:17px;height:20px;border-radius:50% 50% 38% 38%;background:'+previewMask+';margin-bottom:2px;border:1px solid rgba(0,0,0,0.18)"></div>' +
        '</div>' +
        '<div class="mkt-info">' +
          '<div class="mkt-name" style="font-size:13px">'+s.subname+'</div>' +
          '<div class="mkt-desc">'+(s.cost===0?'Free':s.cost+'¢')+'</div>' +
        '</div>' +
        '<button class="'+btnClass+'" style="padding:5px 9px;font-size:11px" data-skin-id="'+id+'" data-cost="'+s.cost+'">'+btnText+'</button>' +
      '</div>';
    }

    function refreshMarket() {
      document.getElementById('mktbalance').textContent = 'Balance: ' + pennyBank + '¢';
      // upgrades
      document.querySelectorAll('.mkt-btn[data-id]').forEach(function(btn) {
        var id=btn.dataset.id, cost=+btn.dataset.cost;
        if (mktOwned(id)) { btn.textContent='✓ Owned'; btn.className='mkt-btn owned'; }
        else if (pennyBank<cost) { btn.textContent=cost+'¢'; btn.className='mkt-btn broke'; }
        else { btn.textContent=cost+'¢'; btn.className='mkt-btn buy'; }
      });
      // skins grouped by operator
      var sl = document.getElementById('mkt-skins-list');
      sl.innerHTML = SKIN_GROUPS.map(function(grp) {
        var rows = grp.ids.map(renderSkinSlot).join('');
        return '<div style="margin-bottom:4px">' +
          '<div style="font:bold 12px \'Chalkboard SE\',\'Comic Sans MS\',cursive;color:#7A5828;' +
               'padding:5px 2px 2px;border-bottom:1px solid rgba(28,25,21,0.12);margin-bottom:5px">' +
            grp.label +
          '</div>' + rows + '</div>';
      }).join('');
    }

    document.getElementById('bmkt').addEventListener('click', function() {
      refreshMarket();
      mktModal.classList.add('open');
    });

    mktModal.addEventListener('click', function(e) {
      // upgrade buy
      var btn = e.target.closest('.mkt-btn[data-id]');
      if (btn && btn.classList.contains('buy')) {
        var id=btn.dataset.id, cost=+btn.dataset.cost;
        if (pennyBank>=cost && !mktOwned(id)) {
          pennyBank-=cost; localStorage.setItem('penny_bank',pennyBank);
          localStorage.setItem(MKT_ITEMS[id].key,1);
          updateBankDisplay(); refreshMarket();
          if(id==='shield') shieldActive=true;
        }
      }
      // skin buy / equip
      var sbtn = e.target.closest('[data-skin-id]');
      if (sbtn) {
        var sid=sbtn.dataset.skinId, sc=+sbtn.dataset.cost;
        var sOwns=skinOwned(sid);
        if (!sOwns && pennyBank>=sc) {
          pennyBank-=sc; localStorage.setItem('penny_bank',pennyBank);
          localStorage.setItem('skin_'+sid,1);
          updateBankDisplay();
          setSkin(sid); refreshMarket();
        } else if (sOwns) {
          setSkin(sid); refreshMarket();
        }
      }
      if (e.target===mktModal || e.target.id==='mktclose') mktModal.classList.remove('open');
    });

    document.getElementById('mktclose').addEventListener('click', function() {
      mktModal.classList.remove('open');
    });
  })();

  (function() {
    var qrGenerated = false;
    var bqr = document.getElementById('bqr');
    var modal = document.getElementById('qrmodal');

    bqr.addEventListener('click', function() {
      modal.classList.add('open');
      if (!qrGenerated) {
        qrGenerated = true;
        var url = window.location.href;
        var isFile = url.startsWith('file://');

        if (isFile) {
          document.getElementById('qrcode').innerHTML =
            '<div style="width:200px;padding:18px 0;font:13px \'Chalkboard SE\',\'Comic Sans MS\',cursive;color:#5A4828;line-height:1.7">' +
            'To play on mobile, run the<br>server script first:<br><br>' +
            '<code style="background:#E8E4D8;padding:4px 8px;border-radius:6px;font-size:12px;color:#1C1915">' +
            'python3 server.py</code><br><br>' +
            'Then open this file again<br>via the printed URL and<br>tap 📱 for the QR code.' +
            '</div>';
          document.getElementById('qrurl').textContent = 'File opened locally — QR needs an http:// URL';
        } else {
          document.getElementById('qrurl').textContent = url;
          if (typeof QRCode !== 'undefined') {
            new QRCode(document.getElementById('qrcode'), {
              text: url,
              width: 200, height: 200,
              colorDark: '#1C1915', colorLight: '#F2EFE7',
              correctLevel: QRCode.CorrectLevel.M
            });
          } else {
            document.getElementById('qrcode').innerHTML =
              '<p style="color:#D64832;font-size:12px">QR library failed to load.</p>';
          }
        }
      }
    });

    document.getElementById('qrclose').addEventListener('click', function() {
      modal.classList.remove('open');
    });
    modal.addEventListener('click', function(e) {
      if (e.target === modal) modal.classList.remove('open');
    });
  })();
  </script>
</body>
