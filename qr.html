<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Hop — Scan to Play</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; min-height: 100vh;
      background: #1C1915;
      font-family: 'Chalkboard SE', 'Bradley Hand ITC', 'Comic Sans MS', cursive;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #F2EFE7;
      border-radius: 24px;
      padding: 36px 40px 32px;
      text-align: center;
      box-shadow: 0 12px 60px rgba(0,0,0,0.7);
      max-width: 360px; width: 90vw;
    }
    h1 {
      font-size: 26px; color: #1C1915;
      margin-bottom: 4px; letter-spacing: 0.5px;
    }
    .sub {
      font-size: 14px; color: #7A6848;
      margin-bottom: 24px;
    }
    #qrcode {
      display: inline-block;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      margin-bottom: 20px;
    }
    #qrcode canvas, #qrcode img {
      display: block;
    }
    .url-box {
      background: rgba(28,25,21,0.07);
      border: 1.5px solid rgba(28,25,21,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #5A4828;
      word-break: break-all;
      margin-bottom: 20px;
    }
    .play-btn {
      display: inline-block;
      padding: 12px 32px;
      background: #1C1915;
      color: #F2EFE7;
      border-radius: 50px;
      font: bold 16px 'Chalkboard SE','Comic Sans MS',cursive;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: opacity 0.15s;
    }
    .play-btn:hover { opacity: 0.80; }
    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: #9A8868;
    }
    .err {
      color: #D64832; font-size: 13px; padding: 16px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>💀 Platform Hop</h1>
    <p class="sub">Scan to play on your phone</p>
    <div id="qrcode"></div>
    <div class="url-box" id="urlbox">detecting...</div>
    <a class="play-btn" id="playlink" href="index.html">▶ Play on this device</a>
    <p class="hint">Make sure your phone is on the same Wi-Fi network.</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    var gameUrl = window.location.origin + '/index.html';
    document.getElementById('urlbox').textContent = gameUrl;
    document.getElementById('playlink').href = gameUrl;

    if (window.location.protocol === 'file:') {
      document.getElementById('qrcode').innerHTML =
        '<p class="err">Run <strong>Play.command</strong> first,<br>then open this page via the printed URL.</p>';
    } else {
      new QRCode(document.getElementById('qrcode'), {
        text: gameUrl,
        width: 240,
        height: 240,
        colorDark: '#1C1915',
        colorLight: '#F2EFE7',
        correctLevel: QRCode.CorrectLevel.M
      });
    }
  </script>
</body>
</html>
